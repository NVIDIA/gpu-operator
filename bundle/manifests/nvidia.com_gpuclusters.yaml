              draDriver:
                description: DRADriver defines the spec for the NVIDIA DRA driver
                  stack (gpus + computeDomains).
                properties:
                  computeDomains:
                    description: ComputeDomains configures the compute-domain capability
                      of the DRA driver.
                    properties:
