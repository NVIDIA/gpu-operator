suite: serviceaccount
templates:
  - serviceaccount.yaml
release:
  name: gpu-operator
  namespace: gpu-operator
tests:
  - it: should match snapshot
    asserts:
      - matchSnapshot: {}

  - it: respects the release namespace override
    release:
      name: gpu-operator
      namespace: custom-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns
