suite: clusterrole
templates:
  - clusterrole.yaml
release:
  name: gpu-operator
  namespace: gpu-operator
tests:
  - it: should match snapshot
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot when cleanupCRD is enabled
    set:
      operator:
        cleanupCRD: true
    asserts:
      - matchSnapshot: {}


  - it: grants delete on customresourcedefinitions when cleanupCRD is enabled
    set:
      operator:
        cleanupCRD: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - apiextensions.k8s.io
            resources:
              - customresourcedefinitions
            verbs:
              - get
              - list
              - watch
              - update
              - patch
              - create
              - delete
