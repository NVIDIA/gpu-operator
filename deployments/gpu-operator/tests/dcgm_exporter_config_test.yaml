suite: dcgm-exporter custom config
templates:
  - dcgm_exporter_config.yaml
release:
  name: gpu-operator
  namespace: gpu-operator
tests:
  - it: does not render the ConfigMap by default
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render the ConfigMap when create is true but data is empty
    set:
      dcgmExporter:
        config:
          create: true
          name: custom-metrics
    asserts:
      - hasDocuments:
          count: 0

  - it: should match snapshot when create=true and data is provided
    set:
      dcgmExporter:
        config:
          create: true
          name: custom-metrics
          data: |-
            DCGM_FI_DEV_SM_CLOCK, gauge, SM clock frequency (in MHz).
    asserts:
      - matchSnapshot: {}
