{{- $globalEnabled := .Values.networkPolicy.enabled | default false -}}
{{- $globalFrom := .Values.networkPolicy.ingress.from | default (list) -}}
{{- $globalPorts := .Values.networkPolicy.ingress.ports | default (list) -}}
{{- $nfd := (index .Values "node-feature-discovery") | default dict -}}
{{- $nfdName := (get $nfd "nameOverride") | default "node-feature-discovery" -}}
{{- $state := dict "denyAll" false -}}

{{- $operatorNP := .Values.operator.networkPolicy | default dict -}}
{{- if or $globalEnabled ($operatorNP.enabled | default false) }}
{{- $_ := set $state "denyAll" true -}}
{{- $operatorIngress := $operatorNP.ingress | default dict -}}
{{- $operatorFrom := concat $globalFrom ($operatorIngress.from | default (list)) -}}
{{- $operatorPorts := concat ($operatorIngress.ports | default (list)) $globalPorts -}}
{{- if gt (len $operatorPorts) 0 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gpu-operator-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: "gpu-operator"
    {{- with .Values.networkPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: "gpu-operator"
      app: "gpu-operator"
  policyTypes:
    - Ingress
  ingress:
    - {{- with $operatorFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      ports:
        {{- toYaml $operatorPorts | nindent 8 }}
{{- end }}
{{- end }}

{{- $dcgmNP := .Values.dcgmExporter.networkPolicy | default dict -}}
{{- if and (.Values.dcgmExporter.enabled | default false) (or $globalEnabled ($dcgmNP.enabled | default false)) }}
