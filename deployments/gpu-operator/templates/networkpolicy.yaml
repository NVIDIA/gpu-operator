{{- $nfdMaster := (get $nfd "master") | default dict -}}
{{- $nfdMasterNP := $nfdMaster.networkPolicy | default dict -}}
{{- if and (.Values.nfd.enabled | default false) ($nfdMaster.enable | default false) (or $globalEnabled ($nfdMasterNP.enabled | default false)) }}
