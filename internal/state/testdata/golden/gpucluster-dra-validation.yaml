apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: nvidia-dra-validator
    app.kubernetes.io/name: nvidia-dra-validator
  name: nvidia-dra-validator
  namespace: test-operator
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: nvidia-dra-validator-gpu
  namespace: test-operator
spec:
  spec:
    devices:
      requests:
      - exactly:
          adminAccess: true
          allocationMode: ExactCount
          count: 1
          deviceClassName: gpu.nvidia.com
        name: validation-gpu
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: nvidia-dra-validator
    app.kubernetes.io/component: nvidia-dra-validator
    app.kubernetes.io/name: nvidia-dra-validator
  name: nvidia-dra-validator
  namespace: test-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-dra-validator
  template:
    metadata:
      labels:
        app: nvidia-operator-validator
        app.kubernetes.io/component: nvidia-dra-validator
        app.kubernetes.io/name: nvidia-dra-validator
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: In
                values:
                - "true"
      containers:
      - command:
        - sh
        - -c
        - echo all validations are successful; while true; do sleep 86400; done
        image: nvcr.io/nvidia/gpu-operator-validator:test
        imagePullPolicy: IfNotPresent
        name: nvidia-dra-validator
      initContainers:
      - command:
        - sh
        - -c
        - nvidia-smi -L
        image: nvcr.io/nvidia/gpu-operator-validator:test
        imagePullPolicy: IfNotPresent
        name: gpu-validation
        resources:
          claims:
          - name: validation-gpu
      nodeSelector:
        nvidia.com/gpu-operator.resource-allocation.mode: dra
        nvidia.com/gpu.deploy.dra-validator: "true"
      priorityClassName: system-node-critical
      resourceClaims:
      - name: validation-gpu
        resourceClaimTemplateName: nvidia-dra-validator-gpu
      serviceAccountName: nvidia-dra-validator
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 100%
    type: RollingUpdate
---
