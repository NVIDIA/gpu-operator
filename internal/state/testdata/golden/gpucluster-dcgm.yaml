apiVersion: v1
kind: ServiceAccount
metadata:
  name: nvidia-dcgm-dra
  namespace: test-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nvidia-dcgm-dra
  namespace: test-operator
rules:
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaims
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nvidia-dcgm-dra
  namespace: test-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nvidia-dcgm-dra
subjects:
- kind: ServiceAccount
  name: nvidia-dcgm-dra
  namespace: test-operator
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: nvidia-dcgm-admin
  namespace: test-operator
spec:
  spec:
    devices:
      requests:
      - exactly:
          adminAccess: true
          allocationMode: All
          deviceClassName: gpu.nvidia.com
        name: admin-gpus
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: nvidia-dcgm-dra
  name: nvidia-dcgm-dra
  namespace: test-operator
spec:
  selector:
    matchLabels:
      app: nvidia-dcgm-dra
  template:
    metadata:
      labels:
        app: nvidia-dcgm-dra
    spec:
      containers:
      - image: nvcr.io/nvidia/cloud-native/dcgm:test
        livenessProbe:
          initialDelaySeconds: 15
          tcpSocket:
            port: 5555
        name: nvidia-dcgm-ctr
        ports:
        - containerPort: 5555
          name: dcgm
        readinessProbe:
          initialDelaySeconds: 15
          tcpSocket:
            port: 5555
        resources:
          claims:
          - name: admin-gpus
        securityContext:
          privileged: true
      nodeSelector:
        nvidia.com/gpu-operator.resource-allocation.mode: dra
        nvidia.com/gpu.deploy.dcgm: "true"
      priorityClassName: system-node-critical
      resourceClaims:
      - name: admin-gpus
        resourceClaimTemplateName: nvidia-dcgm-admin
      serviceAccountName: nvidia-dcgm-dra
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
  updateStrategy:
    type: RollingUpdate
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nvidia-dcgm-dra
  name: nvidia-dcgm-dra
  namespace: test-operator
spec:
  internalTrafficPolicy: Local
  ports:
  - name: dcgm
    port: 5555
    protocol: TCP
    targetPort: 5555
  selector:
    app: nvidia-dcgm-dra
  type: ClusterIP
---
