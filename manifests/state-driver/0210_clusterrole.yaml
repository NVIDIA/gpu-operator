apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Driver.Name }}
rules:
- apiGroups:
  - config.openshift.io
  resources:
  - clusterversions
  verbs:
  - get
  - list
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  # delete lets the drain helper remove GPU pods on clusters without the eviction API
  # subresource enabled; eviction (below) is preferred when available.
  - delete
- apiGroups:
  - ""
  resources:
  - pods/eviction
  verbs:
  - create
# k8s-driver-manager resolves pod ResourceClaims to find GPU pods allocated through DRA
# before evicting them across a driver reload.
- apiGroups:
  - resource.k8s.io
  resources:
  - resourceclaims
  verbs:
  - get
  - list
- apiGroups:
  - apps
  resources:
  - daemonsets
  verbs:
  - get
