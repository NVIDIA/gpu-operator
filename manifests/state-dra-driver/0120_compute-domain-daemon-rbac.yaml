{{- if .DRADriver.Spec.IsComputeDomainsEnabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: compute-domain-daemon-service-account
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: nvidia-dra-driver
    app.kubernetes.io/component: compute-domain-daemon
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: compute-domain-daemon
rules:
- apiGroups:
  - resource.nvidia.com
  resources:
  - computedomains
  - computedomains/status
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - resource.nvidia.com
  resources:
  - computedomaincliques
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compute-domain-daemon
subjects:
- kind: ServiceAccount
  name: compute-domain-daemon-service-account
  namespace: {{ .Namespace }}
roleRef:
  kind: ClusterRole
  name: compute-domain-daemon
  apiGroup: rbac.authorization.k8s.io
{{- end }}
