{{ if .OpenshiftVersion }}
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: true
allowHostPID: false
allowHostPorts: true
allowPrivilegeEscalation: true
allowPrivilegedContainer: true
allowedCapabilities:
- '*'
allowedUnsafeSysctls:
- '*'
apiVersion: security.openshift.io/v1
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
groups: []
kind: SecurityContextConstraints
metadata:
  annotations:
    kubernetes.io/description: 'Grants the NVIDIA DRA driver kubelet-plugin and ComputeDomain daemons the privileged and
      host access it needs on OpenShift.'
  name: nvidia-dra-driver
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities: null
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
- '*'
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:{{ .Namespace }}:nvidia-dra-driver-kubeletplugin
- system:serviceaccount:{{ .Namespace }}:compute-domain-daemon-service-account
volumes:
- '*'
{{end}}
