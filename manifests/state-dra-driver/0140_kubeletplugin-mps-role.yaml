{{- if index .DRADriver.Spec.FeatureGates "MPSSupport" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nvidia-dra-driver-kubeletplugin-mps
  namespace: {{ .Namespace }}
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nvidia-dra-driver-kubeletplugin-mps
  namespace: {{ .Namespace }}
subjects:
- kind: ServiceAccount
  name: nvidia-dra-driver-kubeletplugin
  namespace: {{ .Namespace }}
roleRef:
  kind: Role
  name: nvidia-dra-driver-kubeletplugin-mps
  apiGroup: rbac.authorization.k8s.io
{{- end }}
