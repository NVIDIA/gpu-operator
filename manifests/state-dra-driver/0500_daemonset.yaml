apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-dra-driver-kubelet-plugin
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/name: nvidia-dra-driver
    app.kubernetes.io/component: nvidia-dra-driver-kubelet-plugin
    app: nvidia-dra-driver-kubelet-plugin
    {{- range $k, $v := .Daemonsets.Labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- if .Daemonsets.Annotations }}
  annotations:
    {{- range $k, $v := .Daemonsets.Annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app: nvidia-dra-driver-kubelet-plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "100%"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-dra-driver
        app.kubernetes.io/component: nvidia-dra-driver-kubelet-plugin
        app: nvidia-dra-driver-kubelet-plugin
        {{- range $k, $v := .Daemonsets.Labels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      {{- if .Daemonsets.Annotations }}
      annotations:
        {{- range $k, $v := .Daemonsets.Annotations }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
    spec:
      priorityClassName: {{ .KubeletPluginPriorityClassName }}
      serviceAccountName: nvidia-dra-driver-kubeletplugin
      {{- if .DRADriver.Spec.ImagePullSecrets }}
      imagePullSecrets:
      {{- range .DRADriver.Spec.ImagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if .KubeletPluginNodeSelector }}
      nodeSelector: {{ .KubeletPluginNodeSelector | toJson }}
      {{- end }}
      {{- if .KubeletPluginAffinity }}
      affinity: {{ .KubeletPluginAffinity | toJson }}
      {{- else }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: feature.node.kubernetes.io/pci-10de.present
                operator: In
                values:
                - "true"
            - matchExpressions:
              - key: feature.node.kubernetes.io/cpu-model.vendor_id
                operator: In
                values:
                - NVIDIA
            - matchExpressions:
              - key: nvidia.com/gpu.present
                operator: In
                values:
                - "true"
      {{- end }}
      {{- if .KubeletPluginTolerations }}
      tolerations:
      {{- range .KubeletPluginTolerations }}
      - {{ . | toJson }}
      {{- end }}
      {{- end }}
      initContainers:
      - name: dra-driver-validator
        image: {{ .DRADriver.InitImagePath }}
        {{- if .DRADriver.Spec.ImagePullPolicy }}
        imagePullPolicy: {{ .DRADriver.Spec.ImagePullPolicy }}
        {{- end }}
        command:
        - dra-driver-validator
        securityContext:
          privileged: true
          # The validator ships in the gpu-operator image (USER 65532); it must run
          # as root to chroot into the host root for the host-driver probe.
          runAsUser: 0
        env:
        - name: HOST_ROOT
          value: {{ .HostPaths.RootFS | default "/" | quote }}
        - name: DRIVER_INSTALL_DIR
          value: {{ .HostPaths.DriverInstallDir | default "/run/nvidia/driver" | quote }}
        volumeMounts:
        - name: host-root
          mountPath: /host
          mountPropagation: HostToContainer
          readOnly: true
        - name: driver-install-dir
          mountPath: /run/nvidia/driver
          mountPropagation: HostToContainer
        - name: validations
          mountPath: /run/nvidia/validations
      containers:
      {{- if .DRADriver.Spec.IsGPUsEnabled }}
      - name: gpus
        image: {{ .DRADriver.ImagePath }}
        {{- if .DRADriver.Spec.ImagePullPolicy }}
        imagePullPolicy: {{ .DRADriver.Spec.ImagePullPolicy }}
        {{- end }}
        securityContext:
          privileged: true
        command:
        - bash
        - -c
        args:
        - |-
          # Export the driver-ready env contract (NVIDIA_DRIVER_ROOT,
          # DRIVER_ROOT_CTR_PATH) written by the dra-driver-validator init container.
          set -a
          source /run/nvidia/validations/driver-ready
          set +a
          # Conditionally mask the params file to prevent this container from
          # recreating any missing GPU device nodes (e.g. under nvkind).
          if [ "${MASK_NVIDIA_DRIVER_PARAMS}" = "true" ]; then
            cp /proc/driver/nvidia/params /root/gpu-params
            sed -i 's/^ModifyDeviceFiles: 1$/ModifyDeviceFiles: 0/' /root/gpu-params
            mount --bind /root/gpu-params /proc/driver/nvidia/params
          fi
          exec gpu-kubelet-plugin -v "${LOG_VERBOSITY}"
        env:
        - name: HTTP_ENDPOINT
          value: ":8080"
        - name: METRICS_PATH
          value: /metrics
        - name: LOG_VERBOSITY
          value: "4"
        - name: MASK_NVIDIA_DRIVER_PARAMS
          value: ""
        - name: NVIDIA_VISIBLE_DEVICES
          value: void
        - name: CDI_ROOT
          value: /var/run/cdi
        - name: NVIDIA_MIG_CONFIG_DEVICES
          value: all
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: IMAGE_NAME
          value: {{ .DRADriver.ImagePath | quote }}
        - name: KUBELET_REGISTRAR_DIRECTORY_PATH
          value: {{ printf "%s/plugins_registry" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
        - name: KUBELET_PLUGINS_DIRECTORY_PATH
          value: {{ printf "%s/plugins" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
        - name: HEALTHCHECK_PORT
          value: "51516"
        {{- if .FeatureGates }}
        - name: FEATURE_GATES
          value: {{ .FeatureGates | quote }}
        {{- end }}
        {{- range .DRADriver.Spec.GPUs.KubeletPlugin.Env }}
        - name: {{ .Name }}
          value: {{ .Value | quote }}
        {{- end }}
        startupProbe:
          grpc:
            port: 51516
            service: liveness
          failureThreshold: 600
          periodSeconds: 1
          timeoutSeconds: 10
        livenessProbe:
          grpc:
            port: 51516
            service: liveness
          failureThreshold: 3
          periodSeconds: 30
          timeoutSeconds: 10
        {{- if .DRADriver.Spec.GPUs.KubeletPlugin.Resources }}
        resources: {{ .DRADriver.Spec.GPUs.KubeletPlugin.Resources | toJson }}
        {{- end }}
        volumeMounts:
        - name: plugins-registry
          mountPath: {{ printf "%s/plugins_registry" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
        - name: plugins
          mountPath: {{ printf "%s/plugins" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
          mountPropagation: Bidirectional
        - name: cdi
          mountPath: /var/run/cdi
        - name: validations
          mountPath: /run/nvidia/validations
          readOnly: true
        - name: host-root
          mountPath: /host
          mountPropagation: HostToContainer
          readOnly: true
        - name: driver-install-dir
          mountPath: /run/nvidia/driver
          mountPropagation: HostToContainer
      {{- end }}
      {{- if .DRADriver.Spec.IsComputeDomainsEnabled }}
      - name: compute-domains
        image: {{ .DRADriver.ImagePath }}
        {{- if .DRADriver.Spec.ImagePullPolicy }}
        imagePullPolicy: {{ .DRADriver.Spec.ImagePullPolicy }}
        {{- end }}
        securityContext:
          privileged: true
        command:
        - bash
        - -c
        args:
        - |-
          # Export the driver-ready env contract (NVIDIA_DRIVER_ROOT,
          # DRIVER_ROOT_CTR_PATH) written by the dra-driver-validator init container.
          set -a
          source /run/nvidia/validations/driver-ready
          set +a
          # Conditionally mask the params file to prevent this container from
          # recreating any missing GPU device nodes (e.g. under nvkind).
          if [ "${MASK_NVIDIA_DRIVER_PARAMS}" = "true" ]; then
            cp /proc/driver/nvidia/params /root/gpu-params
            sed -i 's/^ModifyDeviceFiles: 1$/ModifyDeviceFiles: 0/' /root/gpu-params
            mount --bind /root/gpu-params /proc/driver/nvidia/params
          fi
          exec compute-domain-kubelet-plugin -v "${LOG_VERBOSITY}"
        env:
        - name: HTTP_ENDPOINT
          value: ":8081"
        - name: METRICS_PATH
          value: /metrics
        - name: LOG_VERBOSITY
          value: "4"
        - name: MASK_NVIDIA_DRIVER_PARAMS
          value: ""
        - name: NVIDIA_VISIBLE_DEVICES
          value: void
        - name: CDI_ROOT
          value: /var/run/cdi
        - name: NVIDIA_MIG_CONFIG_DEVICES
          value: all
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBELET_REGISTRAR_DIRECTORY_PATH
          value: {{ printf "%s/plugins_registry" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
        - name: KUBELET_PLUGINS_DIRECTORY_PATH
          value: {{ printf "%s/plugins" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
        - name: HEALTHCHECK_PORT
          value: "51515"
        {{- if .FeatureGates }}
        - name: FEATURE_GATES
          value: {{ .FeatureGates | quote }}
        {{- end }}
        {{- range .DRADriver.Spec.ComputeDomains.KubeletPlugin.Env }}
        - name: {{ .Name }}
          value: {{ .Value | quote }}
        {{- end }}
        startupProbe:
          grpc:
            port: 51515
            service: liveness
          failureThreshold: 600
          periodSeconds: 1
          timeoutSeconds: 10
        livenessProbe:
          grpc:
            port: 51515
            service: liveness
          failureThreshold: 3
          periodSeconds: 10
          timeoutSeconds: 10
        {{- if .DRADriver.Spec.ComputeDomains.KubeletPlugin.Resources }}
        resources: {{ .DRADriver.Spec.ComputeDomains.KubeletPlugin.Resources | toJson }}
        {{- end }}
        volumeMounts:
        - name: plugins-registry
          mountPath: {{ printf "%s/plugins_registry" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
        - name: plugins
          mountPath: {{ printf "%s/plugins" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
          mountPropagation: Bidirectional
        - name: cdi
          mountPath: /var/run/cdi
        - name: validations
          mountPath: /run/nvidia/validations
          readOnly: true
        - name: host-root
          mountPath: /host
          mountPropagation: HostToContainer
          readOnly: true
        - name: driver-install-dir
          mountPath: /run/nvidia/driver
          mountPropagation: HostToContainer
      {{- end }}
      volumes:
      - name: plugins-registry
        hostPath:
          path: {{ printf "%s/plugins_registry" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
      - name: plugins
        hostPath:
          path: {{ printf "%s/plugins" (.HostPaths.KubeletRootDir | default "/var/lib/kubelet") | quote }}
      - name: cdi
        hostPath:
          path: /var/run/cdi
      - name: host-root
        hostPath:
          path: {{ .HostPaths.RootFS | default "/" | quote }}
      - name: driver-install-dir
        hostPath:
          path: {{ .HostPaths.DriverInstallDir | default "/run/nvidia/driver" | quote }}
          type: DirectoryOrCreate
      - name: validations
        emptyDir: {}
