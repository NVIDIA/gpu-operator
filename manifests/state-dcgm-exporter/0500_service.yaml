apiVersion: v1
kind: Service
metadata:
  name: nvidia-dcgm-exporter-dra
  namespace: {{ .Namespace }}
  labels:
    app: nvidia-dcgm-exporter-dra
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: {{ .ServiceType }}
  {{- if .ServiceInternalTrafficPolicy }}
  internalTrafficPolicy: {{ .ServiceInternalTrafficPolicy }}
  {{- end }}
  selector:
    app: nvidia-dcgm-exporter-dra
  ports:
  - name: gpu-metrics
    port: 9400
    targetPort: 9400
    protocol: TCP
