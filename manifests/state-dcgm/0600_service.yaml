apiVersion: v1
kind: Service
metadata:
  name: nvidia-dcgm-dra
  namespace: {{ .Namespace }}
  labels:
    app: nvidia-dcgm-dra
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  selector:
    app: nvidia-dcgm-dra
  ports:
  - name: "dcgm"
    port: 5555
    targetPort: 5555
    protocol: TCP
