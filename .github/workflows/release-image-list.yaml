name: Release Image List

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  generate-image-list:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.generate.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v6
        name: Check out code
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install --quiet pyyaml
      - name: Generate image list
        id: generate
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          ARTIFACT_NAME="gpu-operator-images.txt"
          python3 .github/scripts/generate-image-list.py \
            --gpu-operator-version "${RELEASE_TAG_NAME}" \
            --output "${ARTIFACT_NAME}"
          echo "artifact_name=${ARTIFACT_NAME}" >> "${GITHUB_OUTPUT}"
      - name: Upload image list artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.generate.outputs.artifact_name }}
          path: ${{ steps.generate.outputs.artifact_name }}
          if-no-files-found: error

  upload-image-list-to-release:
    needs: [generate-image-list]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        name: Check out code
        with:
          persist-credentials: false
      - name: Download image list artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.generate-image-list.outputs.artifact_name }}
      - name: Attach image list to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: ${{ needs.generate-image-list.outputs.artifact_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "${RELEASE_TAG_NAME}" "${ARTIFACT_NAME}" --clobber
